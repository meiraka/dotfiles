#(tmux show-environment KUBE_CONTEXT | cut -d= -f2) \
#(tmux show-environment KUBE_NAMESPACE | cut -d= -f2) \
#(bash which mpc > /dev/null && \
  mpc | grep playing > /dev/null && \
  mpc current -f 'now playing %%artist%% - #####[fg=colour96#]%%title%%#####[default#]') \
#(date '+%Y%m%d %H%M') \
