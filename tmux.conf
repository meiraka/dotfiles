set-option -g focus-events on
# set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ',xterm*:Tc'

# ======
# colors
# ======
set-window-option -g status-style bg=default
set-window-option -g status-style fg=white

set-window-option -g mode-style bg=default
set-window-option -g mode-style fg=blue

# darker inactive pane
set-window-option -g window-active-style fg=terminal,bg=terminal
set-window-option -g window-style        fg=#737373,bg=black

set-option -g pane-border-style fg=brightblack,bg=default
set-option -g pane-active-border-style fg=white,bg=default
set-option -g pane-border-indicators arrows
set-option -g allow-passthrough on

# ======
# status
# ======
set-option -g status-interval 2
set-option -g status-position top
set-option -g status-left-length  180
set-option -g status-right-length 180
# hide window list
set-window-option -g window-status-format ""
set-window-option -g window-status-current-format ""
# show workspace indecator
set -g status-left         " \
#{?#{==:1,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_1_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:2,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_2_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:3,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_3_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:4,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_4_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:5,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_5_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:6,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_6_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:7,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_7_*,#{W:_#{window_index}_}},●,○} \
#{?#{==:8,#{active_window_index}},#[fg=white],#[fg=brightblack]}\
#{?#{m:*_8_*,#{W:_#{window_index}_}},●,○} \
"
# show title and k8s context
set -g status-right        "\
#[align=absolute-centre]\
#{?client_prefix,#[fg=red]tmux: prefix,\
#{?#{==:#{pane_mode},copy-mode},#[fg=blue]tmux: copy mode,\
#W#[fg=green]}}\
#[align=right]#[push-default]\
#{?#{==:#{E:KUBE_CONTEXT},},,#[fg=black]#[fg=default]#[bg=black]󱃾 #{E:KUBE_CONTEXT}\
#{?#{==:#{E:KUBE_NAMESPACE},},, #[reverse]#{E:KUBE_NAMESPACE} }\
}\
"

# ========
# keybinds
# ========

# basic options
set-option -g prefix C-f
set-option -sg escape-time 0
setw -g mode-keys vi
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send -X rectangle-off\; send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-on\; send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
# send prefix to child tmux
# bind-key -n C-f send-prefix

# reload config
bind-key -n M-r source-file ~/.tmux.conf \; \
           display-message "reloaded"

# detach
bind-key -n M-Q detach

# alt-NUM key as a switch workspace
set-option -g base-index 1
set-window-option -g pane-base-index 1
bind-key -n M-1 if-shell "tmux list-windows | grep ^1:" "select-window -t 1; refresh -S" "new-window -t 1; refresh -S"
bind-key -n M-2 if-shell "tmux list-windows | grep ^2:" "select-window -t 2; refresh -S" "new-window -t 2; refresh -S"
bind-key -n M-3 if-shell "tmux list-windows | grep ^3:" "select-window -t 3; refresh -S" "new-window -t 3; refresh -S"
bind-key -n M-4 if-shell "tmux list-windows | grep ^4:" "select-window -t 4; refresh -S" "new-window -t 4; refresh -S"
bind-key -n M-5 if-shell "tmux list-windows | grep ^5:" "select-window -t 5; refresh -S" "new-window -t 5; refresh -S"
bind-key -n M-6 if-shell "tmux list-windows | grep ^6:" "select-window -t 6; refresh -S" "new-window -t 6; refresh -S"
bind-key -n M-7 if-shell "tmux list-windows | grep ^7:" "select-window -t 7; refresh -S" "new-window -t 7; refresh -S"
bind-key -n M-8 if-shell "tmux list-windows | grep ^8:" "select-window -t 8; refresh -S" "new-window -t 8; refresh -S"
# alt-shift-NUM key as a move pane to workspace
bind-key -n "M-!"  join-pane -t :1 \; last-window \; refresh -S
bind-key -n "M-@"  join-pane -t :2 \; last-window \; refresh -S
bind-key -n "M-#"  join-pane -t :3 \; last-window \; refresh -S
bind-key -n "M-\$" join-pane -t :4 \; last-window \; refresh -S
bind-key -n "M-%"  join-pane -t :5 \; last-window \; refresh -S
bind-key -n "M-^"  join-pane -t :6 \; last-window \; refresh -S
bind-key -n "M-&"  join-pane -t :7 \; last-window \; refresh -S
bind-key -n "M-*"  join-pane -t :8 \; last-window \; refresh -S

# disable new window creation
unbind-key "!"
unbind-key "\""
unbind-key "c"
unbind-key "'"
unbind-key "("
unbind-key ")"
unbind-key ","
unbind-key "-"
unbind-key "."
